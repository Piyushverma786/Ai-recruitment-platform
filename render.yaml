# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connect https://github.com/Piyushverma786/Ai-recruitment-platform
# When prompted, paste secrets for sync:false keys (from backend/.env).
# After first deploy, set BACKEND_URL to your Render service URL (e.g. https://aptiview-backend.onrender.com).
# Optional: node scripts/sync-render-env.mjs (needs RENDER_API_KEY + RENDER_SERVICE_ID).

services:
  - type: web
    name: aptiview-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run render-build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://aptiview.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
